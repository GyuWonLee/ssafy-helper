<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>발표자 뽑기 - SSAFY 17반</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="style.css" rel="stylesheet">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">SSAFY 도우미</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="seating.html">자리 바꾸기</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="presenter.html">발표자 뽑기</a>
                    </li>
                    <li class="nav-item d-flex align-items-center ms-2">
                        <button id="theme-toggle" class="btn btn-sm btn-outline-secondary rounded-circle">🌙</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5 mb-5">
        <div class="text-center mb-4">
            <h1 class="display-5"><a href="index.html" class="text-decoration-none">발표자 뽑기</a></h1>
        </div>

        <div class="row">
            <!-- 학생 명단 입력 -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        학생 명단
                    </div>
                    <div class="card-body">
                        <textarea id="student-list" class="form-control" rows="25" placeholder="한 줄에 한 명씩 이름을 입력하세요">곽도연
곽예경
김건우
김민준
김민지
김윤석
김해찬
도영훈
박윤진
박하민
서현식
손상범
손영주
신다현
신동운
유선경
이건모
이규원
이도연
이은솔
이온유
이정원
임대연
임효선
천창현</textarea>
                        <button id="save-students" class="btn btn-sm btn-outline-secondary mt-2">명단 저장</button>
                    </div>
                </div>
            </div>

            <!-- 기능 -->
            <div class="col-md-8">
                <!-- 발표자 뽑기 -->
                <div class="card">
                    <div class="card-header">
                        발표자 뽑기
                    </div>
                    <div class="card-body">
                        <div class="row align-items-end">
                            <div class="col-auto">
                                <label for="presenter-count" class="form-label">몇 명을 뽑을까요?</label>
                                <input type="number" id="presenter-count" class="form-control" value="1" min="1">
                            </div>
                            <div class="col">
                                <button id="pick-presenter" class="btn btn-success">발표자 뽑기!</button>
                            </div>
                        </div>
                        <hr>
                        <div id="presenter-display" class="mt-3 fs-4"></div>
                    </div>
                </div>

                <!-- 발표자 제외 설정 -->
                <div class="card mt-4">
                    <div class="card-header">
                        발표자 제외 설정
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="excluded-student-list" class="form-label">아래 명단에 있는 학생은 발표자 후보에서 제외됩니다.</label>
                            <textarea id="excluded-student-list" class="form-control" rows="5" placeholder="한 줄에 한 명씩 제외할 학생의 이름을 입력하세요."></textarea>
                        </div>
                        <button id="save-excluded-list" class="btn btn-sm btn-outline-secondary">제외 명단 저장</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <span>SSAFY 15기 17반 이규원</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="common.js"></script>
    <script src="presenter.js"></script>
</body>
</html>
