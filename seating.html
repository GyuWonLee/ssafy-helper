<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자리 바꾸기 - SSAFY 17반</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* 카드 뒤집기 효과 스타일 */
        .seat-container {
            perspective: 1000px; /* 3D 효과의 깊이감 */
            margin-bottom: 10px;
            height: 60px; /* 카드의 높이 고정 */
        }

        .seat-card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); /* 가속/감속 곡선을 적용해 부드러운 느낌을 강화 */
            transform-style: preserve-3d;
        }

        .seat-card.flipped {
            transform: rotateY(180deg);
        }

        .seat-front, .seat-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* 뒷면이 보이지 않게 처리 */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .seat-front {
            background-color: #2141c2; /* Point Color */
            color: white;
        }

        .seat-back {
            background-color: #f8f9fa;
            color: #333;
            border: 1px solid #dee2e6;
            font-size: 1.1rem; /* 학생 이름 폰트 크기 조정 */
            transform: rotateY(180deg); /* 뒷면은 미리 뒤집어둠 */
        }

        /* 수정 가능한 이름 영역에 대한 포커스 스타일 */
        .seat-back[contenteditable="true"]:focus {
            outline: 2px solid #0d6efd;
            background-color: #e9ecef;
            box-shadow: 0 0 5px rgba(13, 110, 253, 0.5);
        }

        /* html2canvas 캡처용 임시 스타일 */
        /* 캡처하는 동안 3D 회전 효과를 비활성화하여 렌더링 오류를 방지합니다. */
        body.html2canvas-rendering .seat-card.flipped {
            transform: none !important;
        }
        body.html2canvas-rendering .seat-card.flipped .seat-front {
            display: none !important;
        }
        body.html2canvas-rendering .seat-card.flipped .seat-back {
            transform: none !important;
            position: relative !important;
        }

        .logo-img {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
